<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ToDoリスト管理サイト</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        header {
            background: #333;
            color: white;
            padding: 16px 32px;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 32px;
            border-radius: 8px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            box-sizing: border-box;
        }

        button, .button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .message {
            background: #ffe0e0;
            padding: 10px;
            margin-bottom: 16px;
            border-radius: 4px;
        }

        .link {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>ToDoリスト管理サイト</h1>
    </header>

    <main>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
